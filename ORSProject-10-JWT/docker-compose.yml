version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: project10-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: project10
    ports:
      - "3308:3306"
    networks:
      - mynetwork
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ./backend/ORSProject-10-JWT
      dockerfile: Dockerfile
    image: project10-backend:latest
    container_name: project10-backend
    ports:
      - "8080:8080"
    networks:
      - mynetwork
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/project10
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=false

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: project10-frontend:latest
    container_name: project10-frontend
    ports:
      - "8081:80"
    networks:
      - mynetwork
    depends_on:
      - backend

networks:
  mynetwork:
    driver: bridge

volumes:
  mysql-data: